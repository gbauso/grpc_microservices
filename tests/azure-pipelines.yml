pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: 'Test'
    jobs:
      - job: 'InstallDependencies'
        steps:
          - script: |
              curl -fsSL https://testspace-client.s3.amazonaws.com/testspace-linux.tgz | sudo tar -zxvf- -C /usr/local/bin
              testspace config url gbauso.testspace.com
            displayName: Install Testspace client
          - task: Npm@1
            inputs:
              command: install
              customCommand: -g artillery
      - job: 'RunTests'
        steps:
          - script: artillery quick --count 1 --num 1 -k 'https://api-gbauso.cloud.okteto.net/api/City?City=Berlin&Country=de&Lat=52.520008&Lon=13.404954'
            displayName: Run single test aka sanity
          - script: artillery quick --count 10 --num 10 -k 'https://api-gbauso.cloud.okteto.net/api/City?City=Berlin&Country=de&Lat=52.520008&Lon=13.404954'
            displayName: Run small stress scenario