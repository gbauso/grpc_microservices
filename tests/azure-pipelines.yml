pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: 'Test'
    jobs:
      - job: 'SetupAndRun'
        steps:
          - script: |
              curl -fsSL https://testspace-client.s3.amazonaws.com/testspace-linux.tgz | sudo tar -zxvf- -C /usr/local/bin
              testspace config url gbauso.testspace.com
            displayName: Install Testspace client
          - task: Npm@1
            inputs:
              command: custom
              customCommand: install artillery
              workingDir: '$(Agent.ToolsDirectory)'
          - task: Bash@3
            inputs:
              filePath: '$(Agent.ToolsDirectory)/node_modules/artillery/bin/artillery'
              arguments: 'quick --count 1 --num 1 -k ''https://api-gbauso.cloud.okteto.net/api/City?City=Berlin&Country=de&Lat=52.520008&Lon=13.404954'''
